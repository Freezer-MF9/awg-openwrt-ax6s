name: Build AmneziaWG 2.0 v.1.1 (OpenWrt 25.12.2 AX6S ABI Locked)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      VERSION: "25.12.2"
      REVISION: "r32802-f505120278"
      TARGET: "mediatek"
      SUBTARGET: "mt7622"
      ARCH: "aarch64_cortex-a53"
      KERNEL_ABI: "6.12.74~09da6f8026836be755e675b8c6a70b8c6a70b8b-r1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses5-dev libssl-dev python3 rsync unzip wget curl zstd \
            file

      # =========================================
      # DOWNLOAD EXACT SDK
      # =========================================
      - name: Download OpenWrt SDK
        run: |
          set -e

          BASE_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/${TARGET}/${SUBTARGET}"

          SDK_FILE=$(curl -fsSL "$BASE_URL/" | grep -oE "openwrt-sdk-${VERSION}-${TARGET}-${SUBTARGET}_gcc-[0-9.]+_musl\.Linux-x86_64\.tar\.(xz|zst)" | head -n1)

          if [ -z "$SDK_FILE" ]; then
            echo "SDK not found"
            exit 1
          fi

          echo "Downloading $SDK_FILE"

          wget "$BASE_URL/$SDK_FILE"

          if [[ "$SDK_FILE" == *.tar.zst ]]; then
            tar --zstd -xf "$SDK_FILE"
          else
            tar -xf "$SDK_FILE"
          fi

          rm -f "$SDK_FILE"

      # =========================================
      # FIND SDK
      # =========================================
      - name: Detect SDK
        run: |
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*")
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV

      # =========================================
      # FEEDS + PACKAGES
      # Repository must contain:
      # kmod-amneziawg/
      # amneziawg-tools/
      # luci-proto-amneziawg/
      # =========================================
      - name: Prepare SDK
        run: |
          set -e
          cd "$SDK_DIR"

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          cp -r "$GITHUB_WORKSPACE/kmod-amneziawg" package/ || true
          cp -r "$GITHUB_WORKSPACE/amneziawg-tools" package/ || true
          cp -r "$GITHUB_WORKSPACE/luci-proto-amneziawg" package/ || true

          echo "CONFIG_PACKAGE_kmod-amneziawg=m" > .config
          echo "CONFIG_PACKAGE_amneziawg-tools=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-amneziawg=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-amneziawg-ru=y" >> .config

          make defconfig

      # =========================================
      # BUILD
      # =========================================
      - name: Build packages
        run: |
          set -e
          cd "$SDK_DIR"

          make package/kmod-amneziawg/compile V=s || true
          make package/amneziawg-tools/compile V=s || true
          make package/luci-proto-amneziawg/compile V=s || true

      # =========================================
      # COLLECT IPK
      # =========================================
      - name: Collect packages
        run: |
          mkdir -p release

          find "$SDK_DIR/bin" -type f \( -name "*.ipk" -o -name "*.apk" \) | grep -E "amneziawg|luci-proto" | while read f; do
            cp "$f" release/
          done

          echo "OpenWrt $VERSION" > release/build-info.txt
          echo "Revision: $REVISION" >> release/build-info.txt
          echo "Kernel ABI: $KERNEL_ABI" >> release/build-info.txt
          echo "Build: Dave's Guitar" >> release/build-info.txt

          ls -la release || true

      # =========================================
      # ZIP
      # =========================================
      - name: Archive output
        run: |
          cd release
          zip -r ../amneziawg-2.0-openwrt-${VERSION}.zip .

      # =========================================
      # ARTIFACT
      # =========================================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amneziawg-openwrt
          path: amneziawg-2.0-openwrt-${{ env.VERSION }}.zip

      # =========================================
      # RELEASE
      # =========================================
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: amneziawg-2.0-${{ env.VERSION }}
          files: amneziawg-2.0-openwrt-${{ env.VERSION }}.zip
