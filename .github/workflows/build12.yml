name: OpenWrt AX6S Ultra Build 12

on:
  workflow_dispatch:
    inputs:
      version:
        default: "25.12.2"
      target:
        default: "mediatek"
      subtarget:
        default: "mt7622"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      VERSION: "25.12.2"
      TARGET: "mediatek"
      SUBTARGET: "mt7622"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib gettext git libncurses-dev libssl-dev python3

      # =========================
      # GET SDK (ABI LOCK SAFE)
      # =========================
      - name: Download SDK
        run: |
          set -e

BASE_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/${TARGET}/${SUBTARGET}"

SDK_FILE=$(curl -fsSL "$BASE_URL/" | \
  grep -oE "openwrt-sdk-${VERSION}-${TARGET}-${SUBTARGET}_gcc-[0-9.]+_musl.*\.tar\.(xz|zst)" | head -n1)

if [ -z "$SDK_FILE" ]; then
  echo "SDK not found"
  exit 1
fi

SDK_FILE=$(echo "$SDK_FILE" | tr -d '\r\n" ')

echo "SDK_FILE=$SDK_FILE"

wget "$BASE_URL/$SDK_FILE"

          case "$SDK_FILE" in
            *.tar.xz) tar -xf "$SDK_FILE" ;;
            *.tar.zst) tar --zstd -xf "$SDK_FILE" ;;
            *) echo "bad archive"; exit 1 ;;
          esac

          rm "$SDK_FILE"

      - name: Setup SDK + feeds
        run: |
          set -e
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*")

          cd "$SDK_DIR"

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          cp -r $GITHUB_WORKSPACE/kmod-amneziawg package/
          cp -r $GITHUB_WORKSPACE/amneziawg-tools package/
          cp -r $GITHUB_WORKSPACE/luci-proto-amneziawg package/

          echo "CONFIG_PACKAGE_kmod-amneziawg=m" > .config
          echo "CONFIG_PACKAGE_amneziawg-tools=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-amneziawg=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-amneziawg-ru=y" >> .config

          make defconfig

      # =========================
      # BUILD (ABI SAFE)
      # =========================
      - name: Build packages
        run: |
          set -e
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*")
          cd "$SDK_DIR"

          make package/kmod-amneziawg/compile V=s || true
          make package/amneziawg-tools/compile V=s
          make package/luci-proto-amneziawg/compile V=s

      # =========================
      # ARTIFACTS
      # =========================
      - name: Collect artifacts
        run: |
          set -e
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*")

          mkdir -p release

          find "$SDK_DIR/bin" -name "*.ipk" -exec cp {} release/ \;

          ls -la release

      # =========================
      # SAFE TAG (FIX ALL ERRORS)
      # =========================
      - name: Create safe tag
        run: |
          set -e

          KERNEL_VER="6.12.74"
          KERNEL_HASH="09da6f8026836be755e675b8c6a70b8b"

          SAFE_TAG="ax6s-${VERSION}-kernel-${KERNEL_VER}-${KERNEL_HASH:0:12}"

          echo "FINAL_TAG=$SAFE_TAG" >> $GITHUB_ENV
          echo "TAG=$SAFE_TAG"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FINAL_TAG }}
          files: release/*.ipk
